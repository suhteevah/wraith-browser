[package]
name = "sevro-headless"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
description = "Headless Servo port for AI browser agents — no GPU, no window, just DOM + layout + JS"

[dependencies]
# This crate will depend on servo components once the build system is wired.
# For now, it defines the SevroEngine interface as a stub.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
async-trait = "0.1"
wraith-transport = { path = "../../../crates/transport" }
reqwest = { version = "0.12", features = ["json", "cookies", "gzip", "brotli", "multipart"], optional = true }
# Note: wraith-transport/reqwest-backend is activated by the `std` feature below
rquest = { version = "5.1", features = ["cookies", "gzip", "brotli"], optional = true }
rquest-util = { version = "2.2", optional = true }
rquickjs = { version = "0.11", features = ["classes", "properties", "futures", "macro"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
scraper = "0.25"
ego-tree = "0.10"
url = "2"
chrono = { version = "0.4", features = ["serde"] }

[features]
default = ["std"]
std = ["dep:reqwest", "dep:tokio", "dep:rquickjs", "wraith-transport/reqwest-backend"]
stealth-tls = ["std", "dep:rquest", "dep:rquest-util"]

[dev-dependencies]
tokio = { version = "1", features = ["full", "macros"] }
